# ===== ENVIRONMENT =====
num_seconds: 1000
delta_time: 5

# ===== RL HYPERPARAMETERS =====
gamma: 0.9
episodes: 100
policy_update_interval: 4

# ===== EPSILON =====
epsilon:
  start: 0.1
  min: 0.01
  decay: 0.99

# ===== TRAINING =====
master_seed: 34
num_trainings: 10

# ===== MONTE CARLO =====
method: "first_visit"
