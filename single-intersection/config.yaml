  - 15
  - 48
  - 73
  - 101
  - 56
  - 89
  - 12
  - 67
  - 39
  - 84
  - 27
  - 95
  - 43
  - 70
  - 18

# ===== MONTE CARLO =====
monte_carlo:
  method: "every_visit"
